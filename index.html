<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Santron 626 Emulator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <aside class="left-panel">
    <div class="glow-control" aria-label="Glow-Einstellungen">
      <h2>Display-Glow</h2>
      <span class="glow-section-label">Stufe 1</span>
      <div class="glow-row">
        <label for="gr1">Radius</label>
        <input id="gr1" type="range" min="0" max="20" step="0.1" value="3">
        <span class="glow-value" id="gr1v">3.0 px</span>
      </div>
      <div class="glow-row">
        <label for="gi1">Intensität</label>
        <input id="gi1" type="range" min="0" max="1" step="0.01" value="0.5">
        <span class="glow-value" id="gi1v">0.50</span>
      </div>
      <span class="glow-section-label">Stufe 2</span>
      <div class="glow-row">
        <label for="gr2">Radius</label>
        <input id="gr2" type="range" min="0" max="30" step="0.1" value="7">
        <span class="glow-value" id="gr2v">7.0 px</span>
      </div>
      <div class="glow-row">
        <label for="gi2">Intensität</label>
        <input id="gi2" type="range" min="0" max="1" step="0.01" value="0.5">
        <span class="glow-value" id="gi2v">0.50</span>
      </div>
      <span class="glow-section-label">Stufe 3</span>
      <div class="glow-row">
        <label for="gr3">Radius</label>
        <input id="gr3" type="range" min="0" max="50" step="0.5" value="13">
        <span class="glow-value" id="gr3v">13.0 px</span>
      </div>
      <div class="glow-row">
        <label for="gi3">Intensität</label>
        <input id="gi3" type="range" min="0" max="1" step="0.01" value="0.10">
        <span class="glow-value" id="gi3v">0.10</span>
      </div>
    </div>
      <div class="run-options">
        <h2>Programmlauf</h2>
        <label class="speed-control">
          <span>Schrittgeschwindigkeit</span>
          <input id="runSpeed" type="range" min="0" max="51" step="1" value="0">
          <output id="runSpeedValue" for="runSpeed">0 ms</output>
        </label>
        <div class="run-display-options" role="radiogroup" aria-label="Display während Programmlauf">
          <label><input name="runDisplayMode" type="radio" value="live"> Zwischenergebnisse</label>
          <label><input name="runDisplayMode" type="radio" value="hold"> Letzte Eingabe</label>
          <label><input name="runDisplayMode" type="radio" value="blank" checked> Display abdunkeln</label>
        </div>
      </div>
    </aside>
    <section class="center-panel">
    <section class="calculator" aria-label="Santron 626 Emulator">
      <div class="brand"><img src="assets/santron-logo.svg" alt="Santron"></div>
      <div class="display-wrap">
        <div class="display" aria-live="polite" id="display"></div>
      </div>

      <div class="keyfield-frame" aria-hidden="true"></div>

      <div class="switch-row">
        <button class="pill blue small" data-key="GTO">GOTO</button>
        <div class="switch-group two angle-switch">
          <div class="switch-labels"><span>RD</span><span>DG</span></div>
          <div class="switch-track">
            <input id="angleRad" name="angle" type="radio">
            <input id="angleDeg" name="angle" type="radio" checked>
            <label for="angleRad" aria-label="Radiant"></label>
            <label for="angleDeg" aria-label="Grad"></label>
            <i></i>
          </div>
        </div>
        <div class="switch-group three mode-switch">
          <div class="switch-labels"><span>LOAD</span><span>CLR</span><span>RUN</span></div>
          <div class="switch-track">
            <input id="modeLoad" name="mode" value="load" type="radio">
            <input id="modeClear" name="mode" value="clear" type="radio">
            <input id="modeRun" name="mode" value="run" type="radio" checked>
            <label for="modeLoad" aria-label="Load"></label>
            <label for="modeClear" aria-label="Clear"></label>
            <label for="modeRun" aria-label="Run"></label>
            <i></i>
          </div>
        </div>
        <div class="switch-group two power-switch">
          <div class="switch-labels"><span>ON</span><span>OFF</span></div>
          <div class="switch-track">
            <input id="powerOn" name="power" type="radio" checked>
            <input id="powerOff" name="power" type="radio">
            <label for="powerOn" aria-label="Ein"></label>
            <label for="powerOff" aria-label="Aus"></label>
            <i></i>
          </div>
        </div>
      </div>

      <div class="nav-row">
        <div class="nav-key"><span class="nav-label nav-arrow-label"><span class="nav-arrow arrow-left"></span><span class="nav-word">BST</span></span><button class="pill blue" data-key="BST"> </button></div>
        <div class="nav-key"><span class="nav-label nav-arrow-label"><span class="nav-arrow arrow-right"></span><span class="nav-word">SST</span></span><button class="pill blue" data-key="SST"> </button></div>
        <div class="nav-key"><span class="nav-label nav-label-center"><span>R/S</span></span><button class="pill blue" data-key="R/S"> </button></div>
        <div class="nav-key"><span class="nav-label nav-label-skp"><span class="skp-text">SKP</span><span class="nav-sub">(—)</span></span><button class="pill blue" data-key="SKP"> </button></div>
      </div>

      <div class="keypad" id="keypad"></div>
      <div class="build-stamp" aria-label="Build-Version">Build 2026-06-06 10:08</div>
    </section>
    </section>

    <aside class="panel">
      <div class="program-loader">
        <div class="program-head">
          <h2>Programme</h2>
          <div class="program-actions">
            <label class="program-name">
              <span>Name</span>
              <input id="programName" type="text" value="santron-626-program" spellcheck="false">
            </label>
            <button id="saveProgram" type="button">Speichern</button>
            <button id="loadProgram" type="button">Laden</button>
            <button id="clearProgram" type="button">Löschen</button>
          </div>
          <input id="programFile" type="file" accept=".txt,.lst,.626,text/plain" hidden>
        </div>
        <div class="server-program-source">
          <select id="serverProgramSelect" aria-label="Repository-Programm">
            <option value="">Programm aus Repository öffnen...</option>
          </select>
        </div>
      </div>

      <div class="program">
        <h2>Programmspeicher</h2>
        <ol id="programList"></ol>
      </div>
    </aside>
  </main>
  <script src="app.js"></script>
  <script>
    const root = document.documentElement;
    const controls = [
      { id: 'gr1', prop: '--ga', fmt: v => v.toFixed(1) + ' px' },
      { id: 'gr2', prop: '--gb', fmt: v => v.toFixed(1) + ' px' },
      { id: 'gr3', prop: '--gc', fmt: v => v.toFixed(1) + ' px' },
      { id: 'gi1', prop: '--gi1', fmt: v => v.toFixed(2) },
      { id: 'gi2', prop: '--gi2', fmt: v => v.toFixed(2) },
      { id: 'gi3', prop: '--gi3', fmt: v => v.toFixed(2) },
    ];
    controls.forEach(({ id, prop, fmt }) => {
      const input = document.getElementById(id);
      const display = document.getElementById(id + 'v');
      const apply = () => {
        const v = parseFloat(input.value);
        root.style.setProperty(prop, prop.startsWith('--ga') || prop.startsWith('--gb') || prop.startsWith('--gc') ? v + 'px' : v);
        display.textContent = fmt(v);
      };
      input.addEventListener('input', apply);
      apply();
    });
  </script>
</body>
</html>
